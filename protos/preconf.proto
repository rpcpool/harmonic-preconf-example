syntax = "proto3";

package preconf;

service PreconfAuthService {
  rpc GenerateAuthChallenge(GenerateAuthChallengeRequest) returns (GenerateAuthChallengeResponse);
  rpc GenerateAuthTokens(GenerateAuthTokensRequest) returns (GenerateAuthTokensResponse);
}

service PreconfService {
  rpc SubscribePreconfs(SubscribePreconfsRequest) returns (stream Preconf);
}

message GenerateAuthChallengeRequest {
  // 32-byte ed25519 public key.
  bytes pubkey = 1;
}

message GenerateAuthChallengeResponse {
  bytes challenge = 1;
}

message GenerateAuthTokensRequest {
  bytes pubkey = 1;
  bytes challenge = 2;
  // 64-byte ed25519 signature over `challenge`.
  bytes signature = 3;
}

message Token {
  string value = 1;
  int64 expires_at_ms = 2;
}

message GenerateAuthTokensResponse {
  Token access_token = 1;
}

message SubscribePreconfsRequest {}

message Preconf {
  uint64 slot = 1;
  // Raw serialized Solana transaction.
  bytes data = 2;
}
