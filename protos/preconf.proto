syntax = "proto3";

package preconf;

// Standard three-stage auth:
//   1. Client calls `GenerateAuthChallenge(pubkey)` — server returns opaque
//      challenge bytes it must sign.
//   2. Client calls `GenerateAuthTokens(pubkey, challenge, signature)` —
//      server verifies the ed25519 signature, looks up the pubkey in
//      `preconf_keys`, and returns a short-lived JWT access token.
//   3. Client calls `SubscribePreconfs` with `Authorization: Bearer <JWT>`
//      metadata and receives a server-side stream of `Preconf` messages.
service PreconfAuthService {
  rpc GenerateAuthChallenge(GenerateAuthChallengeRequest) returns (GenerateAuthChallengeResponse);
  rpc GenerateAuthTokens(GenerateAuthTokensRequest) returns (GenerateAuthTokensResponse);
}

service PreconfService {
  rpc SubscribePreconfs(SubscribePreconfsRequest) returns (stream Preconf);
}

message GenerateAuthChallengeRequest {
  // 32-byte ed25519 public key.
  bytes pubkey = 1;
}

message GenerateAuthChallengeResponse {
  // Opaque bytes to sign. Bound to pubkey + region + server hostname + a
  // random 32-byte nonce, so a signature cannot be replayed against a
  // different server, region, or session.
  bytes challenge = 1;
}

message GenerateAuthTokensRequest {
  bytes pubkey = 1;
  bytes challenge = 2;
  // 64-byte ed25519 signature over `challenge`.
  bytes signature = 3;
}

message Token {
  // Opaque JWT string. Present as `Authorization: Bearer <value>`.
  string value = 1;
  // Unix milliseconds at which this token expires.
  int64 expires_at_ms = 2;
}

message GenerateAuthTokensResponse {
  Token access_token = 1;
}

message SubscribePreconfsRequest {}

message Preconf {
  uint64 slot = 1;
  // Raw serialized Solana transaction, as it was received by the builder.
  bytes data = 2;
}
